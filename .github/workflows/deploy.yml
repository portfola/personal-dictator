name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      # --- Backend ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambda
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp -r *.py routes/ services/ models/ package/
          # boto3/botocore/s3transfer are provided by the Lambda runtime — drop
          # them (and bytecode/metadata) to keep the package under the limit.
          rm -rf package/boto3 package/botocore package/s3transfer
          find package -type d -name "__pycache__" -prune -exec rm -rf {} +
          cd package && zip -rq ../lambda.zip . && cd ..

      - name: Deploy Lambda
        run: |
          # Upload via S3 to avoid the ~70 MB UpdateFunctionCode request limit.
          aws s3 cp backend/lambda.zip s3://personal-dictator-frontend/_deploy/lambda.zip

          aws lambda update-function-code \
            --function-name personal-dictator-api \
            --s3-bucket personal-dictator-frontend \
            --s3-key _deploy/lambda.zip

          aws lambda wait function-updated \
            --function-name personal-dictator-api

          aws lambda update-function-configuration \
            --function-name personal-dictator-api \
            --environment "Variables={
              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},
              TOGETHER_API_KEY=${{ secrets.TOGETHER_API_KEY }},
              ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }},
              ELEVENLABS_VOICE_ID=${{ secrets.ELEVENLABS_VOICE_ID }},
              DOCUMENTS_BUCKET=personal-dictator-documents,
              AUDIO_BUCKET=personal-dictator-audio-cache,
              DYNAMODB_TABLE=personal-dictator-documents,
              AWS_REGION_NAME=us-east-2,
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},
              GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},
              SESSION_SECRET=${{ secrets.SESSION_SECRET }},
              ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }},
              APP_BASE_URL=https://dictator.portfola.net
            }"

      # --- Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_API_BASE: /api

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://personal-dictator-frontend \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://personal-dictator-frontend/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
