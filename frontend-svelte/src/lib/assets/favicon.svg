<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="horn" x1="150" y1="150" x2="350" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- backdrop tile (matches PWA theme color) -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <g transform="rotate(-18 256 256)">
    <!-- sound waves emanating from the bell -->
    <g fill="none" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round">
      <path d="M118 220 Q96 256 118 292"/>
      <path d="M90 202 Q60 256 90 310"/>
      <path d="M62 186 Q26 256 62 326"/>
    </g>
    <!-- grip / handle -->
    <rect x="276" y="296" width="42" height="98" rx="18" fill="#6d28d9"/>
    <!-- horn (cone) -->
    <path d="M150 165 L330 205 L330 307 L150 347 Z" fill="url(#horn)"/>
    <!-- back mouthpiece -->
    <rect x="324" y="203" width="24" height="106" rx="12" fill="#6d28d9"/>
    <!-- bell rim -->
    <rect x="128" y="150" width="30" height="212" rx="15" fill="#a78bfa"/>
  </g>
</svg>
